[pytest]
# Only collect our own tests — never walk into the vendored .venv.
testpaths = tests
norecursedirs = .venv build dist assets

# Put the project root on sys.path so tests can `import sessionStore`, `import ui`,
# etc. (the app has no package root — modules sit at the repo top level).
pythonpath = .

# Registered markers (use `-m "not ui"` to skip the Qt tier on a headless box).
markers =
    ui: Tier 3 tests that construct real PyQt widgets (need pytest-qt + a display).

# Quiet, readable output by default.
addopts = -q
